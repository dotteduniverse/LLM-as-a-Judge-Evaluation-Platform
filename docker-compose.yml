version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    command: mlflow server --host 0.0.0.0 --backend-store-uri postgresql://mlflow:mlflow@postgres/mlflow --default-artifact-root ./artifacts